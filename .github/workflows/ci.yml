# MediaMop - backend tests, web build/tests, E2E smoke, Docker smoke, and Windows packaging smoke.
# Triggers: push to any branch, pull_request, workflow_dispatch.
# GitHub shows the job as "Test / mediamop".
# Keep this step sequence aligned with .github/workflows/release.yml.
name: Test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mediamop:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MEDIAMOP_SESSION_SECRET: ${{ github.run_id }}-${{ github.job }}-${{ github.run_attempt }}-ci-session-secret-32chars-min
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MediaMop backend (editable) + Playwright browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/backend[dev]"
          python -m playwright install --with-deps chromium

      - name: MediaMop backend lint
        working-directory: apps/backend
        run: ruff check src tests

      - name: Backend security scan (bandit)
        working-directory: apps/backend
        run: bandit -r src -lll -q

      - name: Backend dependency vulnerability scan (pip-audit)
        working-directory: apps/backend
        run: pip-audit --strict

      - name: MediaMop backend type check
        working-directory: apps/backend
        run: mypy src/mediamop

      - name: Run MediaMop backend tests
        working-directory: apps/backend
        env:
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-ci
        run: |
          alembic check
          alembic upgrade head
          pytest -q --cov=mediamop --cov-fail-under=70

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: MediaMop agent documentation map
        run: node scripts/check-agent-docs.mjs

      - name: MediaMop web - install, lint, format, build, unit tests
        working-directory: apps/web
        run: |
          npm ci
          npm run lint
          npm run format
          npm run build
          npm run test

      - name: Frontend dependency vulnerability scan
        working-directory: apps/web
        run: npm audit --audit-level=high

      - name: MediaMop E2E smoke (Playwright + real API)
        env:
          MEDIAMOP_E2E: "1"
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-e2e
          PYTHONPATH: ${{ github.workspace }}/apps/backend/src
        run: python -m pytest tests/e2e/mediamop -q --tb=short

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MEDIAMOP_SESSION_SECRET: ${{ github.run_id }}-${{ github.job }}-${{ github.run_attempt }}-ci-session-secret-32chars-min
    steps:
      - uses: actions/checkout@v6

      - name: Build MediaMop Docker image
        run: docker build -t mediamop-ci-smoke .

      - name: Run MediaMop Docker smoke
        run: |
          docker rm -f mediamop-ci-smoke >/dev/null 2>&1 || true
          docker run -d --name mediamop-ci-smoke -p 8788:8788 \
            -e MEDIAMOP_SESSION_SECRET="$MEDIAMOP_SESSION_SECRET" \
            mediamop-ci-smoke
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8788/health >/tmp/mediamop-health.json; then
              cat /tmp/mediamop-health.json
              exit 0
            fi
            sleep 2
          done
          docker logs mediamop-ci-smoke
          exit 1

      - name: Cleanup MediaMop Docker smoke
        if: always()
        run: docker rm -f mediamop-ci-smoke >/dev/null 2>&1 || true

  windows-package-smoke:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: MediaMop web - install and build
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build MediaMop Windows installer
        env:
          MEDIAMOP_BUILD_VERSION: ci-${{ github.run_number }}
        run: powershell -ExecutionPolicy Bypass -File packaging/windows/build.ps1

      - name: Smoke test packaged Windows server
        run: powershell -ExecutionPolicy Bypass -File scripts/smoke-windows-package.ps1
