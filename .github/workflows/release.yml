# Tag-driven release: push tag v* -> full validation, Windows installer, Docker image, GitHub Release.
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  windows-smoke:
    runs-on: windows-latest
    if: ${{ !contains(github.ref_name, '-') }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Normalize tag version
        id: version
        shell: bash
        run: echo "plain=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate release version alignment
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path

          tag_version = os.environ["TAG_VERSION"].strip()
          if tag_version.startswith("v"):
              tag_version = tag_version[1:]

          backend = tomllib.loads(Path("apps/backend/pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          web = json.loads(Path("apps/web/package.json").read_text(encoding="utf-8"))["version"]
          iss = Path("packaging/windows/MediaMop.iss").read_text(encoding="utf-8")
          match = re.search(r'#define\s+AppVersion\s+"([^"]+)"', iss)
          if not match:
              print("ERROR: Could not find AppVersion define in packaging/windows/MediaMop.iss", file=sys.stderr)
              raise SystemExit(1)
          installer = match.group(1)

          mismatches = []
          for name, value in [
              ("apps/backend/pyproject.toml [project].version", backend),
              ("apps/web/package.json version", web),
              ("packaging/windows/MediaMop.iss AppVersion", installer),
          ]:
              if value != tag_version:
                  mismatches.append((name, value))

          if mismatches:
              print(f"ERROR: Release tag v{tag_version} does not match versioned files:", file=sys.stderr)
              for name, value in mismatches:
                  print(f"  - {name}: {value}", file=sys.stderr)
              raise SystemExit(1)

          print(f"Release versions aligned at {tag_version}.")
          PY
        env:
          TAG_VERSION: ${{ github.ref_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install MediaMop backend (editable)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/backend[dev]"

      - name: MediaMop web - install and build
        working-directory: apps/web
        env:
          VITE_SUPPORT_URL: ${{ vars.VITE_SUPPORT_URL }}
        run: |
          npm ci
          npm run build

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build MediaMop Windows installer
        env:
          MEDIAMOP_BUILD_VERSION: ${{ steps.version.outputs.plain }}
          VITE_SUPPORT_URL: ${{ vars.VITE_SUPPORT_URL }}
        run: powershell -ExecutionPolicy Bypass -File packaging/windows/build.ps1

      - name: Smoke test packaged Windows server
        run: powershell -ExecutionPolicy Bypass -File scripts/smoke-windows-package.ps1 -ExpectedVersion "${{ steps.version.outputs.plain }}"

      - name: Generate installer checksum manifest
        shell: powershell
        run: |
          $hash = (Get-FileHash -LiteralPath "dist/windows/MediaMopSetup.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  MediaMopSetup.exe" | Set-Content -LiteralPath "dist/windows/MediaMopSetup.exe.sha256" -Encoding ascii

      - name: Detect Windows code signing configuration
        id: codesign
        shell: bash
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          if [[ -n "${WINDOWS_CODESIGN_PFX_BASE64}" && -n "${WINDOWS_CODESIGN_PASSWORD}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign MediaMop Windows installer
        if: ${{ steps.codesign.outputs.enabled == 'true' }}
        shell: powershell
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "mediamop-codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX_BASE64))
          $signtool = (Get-Command signtool.exe -ErrorAction Stop).Source
          & $signtool sign /f $pfxPath /p $env:WINDOWS_CODESIGN_PASSWORD /fd sha256 /tr http://timestamp.digicert.com /td sha256 "dist/windows/MediaMopSetup.exe"
          if ($LASTEXITCODE -ne 0) {
            throw "signtool failed with exit code $LASTEXITCODE"
          }

      - name: Verify MediaMop Windows installer signature
        if: ${{ steps.codesign.outputs.enabled == 'true' }}
        shell: powershell
        run: |
          $signature = Get-AuthenticodeSignature -FilePath "dist/windows/MediaMopSetup.exe"
          if ($signature.Status -ne "Valid") {
            throw "Installer signature verification failed: $($signature.Status) $($signature.StatusMessage)"
          }

      - name: Upload MediaMop Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: mediamop-windows-installer
          if-no-files-found: error
          path: |
            dist/windows/MediaMopSetup.exe
            dist/windows/MediaMopSetup.exe.sha256

  tagged-release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    timeout-minutes: 90
    needs: windows-smoke
    permissions:
      contents: write
      packages: write
    env:
      MEDIAMOP_SESSION_SECRET: ${{ github.run_id }}-${{ github.job }}-${{ github.run_attempt }}-release-session-secret-32chars-min
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install MediaMop backend (editable) and Playwright browser
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./apps/backend[dev]"
          python -m playwright install --with-deps chromium

      - name: Backend dependency vulnerability scan (pip-audit)
        working-directory: apps/backend
        run: |
          python -m pip freeze --exclude-editable > pip-audit-requirements.txt
          pip-audit --strict -r pip-audit-requirements.txt
          rm pip-audit-requirements.txt

      - name: Run MediaMop backend tests
        working-directory: apps/backend
        env:
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-ci
        run: |
          alembic upgrade head
          alembic check
          pytest -q --cov=mediamop --cov-fail-under=70

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: MediaMop web - install and unit tests
        working-directory: apps/web
        run: |
          npm ci
          npm run test

      - name: MediaMop web - production build
        working-directory: apps/web
        env:
          VITE_SUPPORT_URL: ${{ vars.VITE_SUPPORT_URL }}
        run: npm run build

      - name: Pack web dist
        run: |
          cd apps/web
          zip -r "$GITHUB_WORKSPACE/mediamop-web-dist.zip" dist

      - name: MediaMop E2E smoke (Playwright + real API)
        env:
          MEDIAMOP_E2E: "1"
          MEDIAMOP_HOME: ${{ runner.temp }}/mediamop-e2e
          PYTHONPATH: ${{ github.workspace }}/apps/backend/src
        run: python -m pytest tests/e2e/mediamop -q --tb=short

      - name: Docker image name
        id: image
        run: echo "name=${REGISTRY}/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Normalize tag version
        id: version
        run: echo "plain=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download MediaMop Windows installer
        uses: actions/download-artifact@v8
        with:
          name: mediamop-windows-installer
          path: ${{ github.workspace }}/windows-artifact

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.plain }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.plain }}

      - name: Verify published Docker manifest
        run: docker manifest inspect "${{ steps.image.outputs.name }}:latest"

      - name: Smoke test published Docker image
        run: |
          docker rm -f mediamop-release-smoke >/dev/null 2>&1 || true
          docker run -d --name mediamop-release-smoke -p 8788:8788 \
            -e MEDIAMOP_SESSION_SECRET="$MEDIAMOP_SESSION_SECRET" \
            "${{ steps.image.outputs.name }}:latest"
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8788/health >/tmp/mediamop-health.json; then
              cat /tmp/mediamop-health.json
              exit 0
            fi
            sleep 2
          done
          docker logs mediamop-release-smoke
          exit 1

      - name: Cleanup Docker smoke container
        if: always()
        run: docker rm -f mediamop-release-smoke >/dev/null 2>&1 || true

      - name: Prepare user-facing release notes
        run: |
          notes_file="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            echo "::error::Missing required release notes file: $notes_file"
            echo "::error::Create it from docs/release-notes/TEMPLATE.md before tagging."
            exit 1
          fi
          cp "$notes_file" "$GITHUB_WORKSPACE/release-notes.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            mediamop-web-dist.zip
            windows-artifact/MediaMopSetup.exe
            windows-artifact/MediaMopSetup.exe.sha256
          body_path: release-notes.md
