# Grouped updates match Dependabot PR titles like "bump the pip group" / "bump the actions group".
version: 2
updates:
  - package-ecosystem: pip
    directory: /apps/backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      pip:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /docs-site
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docs-site:
        patterns:
          - "*"
