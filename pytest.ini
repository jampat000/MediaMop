[pytest]
# E2E and any repo-root ``pytest tests/...`` runs must resolve ``mediamop`` (``apps/backend`` uses
# ``pythonpath = src`` only when pytest's rootdir is ``apps/backend``).
pythonpath =
    apps/backend/src
markers =
    mediamop_e2e: MediaMop React/API spine smoke (opt-in: MEDIAMOP_E2E=1; see tests/e2e/mediamop/)
