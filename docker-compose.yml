# Optional PostgreSQL for local development — NOT required on Windows (native PostgreSQL is first-class).
# Convenience for developers who want Postgres in a container, or Linux-style Compose workflows.
# From this repo root:
#   docker compose up -d
# Connection URL when using this file (host port 5433 avoids clashing with typical native Postgres on 5432):
#   postgresql+psycopg://mediamop:mediamop@127.0.0.1:5433/mediamop
#
# Then set MEDIAMOP_DATABASE_URL (or apps/backend/.env), run alembic, uvicorn + npm run dev.
# Web/API dev ports: docs/ports.md and scripts/dev-ports.json
# For production API containers, set MEDIAMOP_HOME to a volume path (e.g. /var/lib/mediamop).
# See docs/local-development.md

services:
  mediamop-postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mediamop
      POSTGRES_PASSWORD: mediamop
      POSTGRES_DB: mediamop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediamop -d mediamop"]
      interval: 5s
      timeout: 5s
      retries: 5
