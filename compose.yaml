# MediaMop all-in-one (API + production web UI) from GHCR.
# This is the default `docker compose` entrypoint at repo root.
#
# From repo root:
#   docker compose pull
#   docker compose up -d
#
# Open http://localhost:8788/ after the container starts.
# Stable releases currently publish linux/amd64 images.
# Override the image with MEDIAMOP_DOCKER_IMAGE if needed.

name: mediamop

services:
  mediamop:
    image: ${MEDIAMOP_DOCKER_IMAGE:-ghcr.io/jampat000/mediamop:latest}
    pull_policy: always
    ports:
      - "8788:8788"
    environment:
      MEDIAMOP_HOME: ${MEDIAMOP_HOME:-/data/mediamop}
      # Optional. If omitted, the container generates and persists /data/mediamop/session.secret.
      # To provide your own value, generate one with: openssl rand -hex 32
      # MEDIAMOP_SESSION_SECRET: ${MEDIAMOP_SESSION_SECRET}
      # Recommended before saving Pruner/Subber/Sonarr/Radarr credentials:
      # MEDIAMOP_CREDENTIALS_SECRET: ${MEDIAMOP_CREDENTIALS_SECRET}
      # Optional bearer token for Prometheus or other machine scrapes of /metrics:
      # MEDIAMOP_METRICS_BEARER_TOKEN: ${MEDIAMOP_METRICS_BEARER_TOKEN}
    volumes:
      - mediamop_data:/data/mediamop
    restart: unless-stopped

volumes:
  mediamop_data:
